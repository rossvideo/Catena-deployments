{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ printf "%s-dashboard" (include "catena.fullname" .) }}
  labels:
    {{- include "catena.labels" . | nindent 4 }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ include "catena.ingress.host" . | quote}}
      http:
        paths:
          - path: /connect/connection-props.xml
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-dashboard" (include "catena.fullname" .) }}
                port:
                  number: {{ .Values.dashboard_port }}
{{- end }}
