apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-dashboard" (include "catena.fullname" .) }}
  labels:
    {{- include "catena.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.dashboard_port }}
      targetPort: {{ .Values.dashboard_port }}
      protocol: TCP
  selector:
    {{- include "catena.selectorLabels" . | nindent 4 }} 
